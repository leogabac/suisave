# Remote sync configuration for project-local usage.
# Keep this file near the directory you want to sync.

[global]
# Optional defaults.
default_rsync_flags = ["-azvh"]
default_remote_base = "backups"
default_mode = "push"

[connection]
host = "storage.example.com"
user = "backup"
port = 22
# Paths are resolved relative to this config file.
identity_file = "./.secrets/suisave_ed25519"
ssh_options = [
  "StrictHostKeyChecking=accept-new",
]

[[jobs.sync]]
name = "project"
sources = ["./"]
target_base = "projects/my-project"
default_mode = "push"
delete = true

[[jobs.sync]]
name = "notes"
sources = [
  "./notes",
  "./docs",
]
target_base = "projects/my-project"
flags = ["-azvh"]
default_mode = "pull"
